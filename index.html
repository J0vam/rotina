<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Rotina</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;
  --surface:#141414;
  --card:#1a1a1a;
  --border:#252525;
  --accent:#c8f135;
  --accent2:#ff6b2b;
  --text:#f0f0f0;
  --muted:#555;
  --muted2:#333;
  --success:#4ade80;
  --radius:12px;
}
html{background:var(--bg);height:100%;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  max-width:480px;
  margin:0 auto;
  padding-bottom:90px;
  font-size:15px;
}

/* NAV */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(14,14,14,0.95);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;
  z-index:100;
  padding:8px 0 max(8px, env(safe-area-inset-bottom));
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 0;background:none;border:none;color:var(--muted);
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;
  text-transform:uppercase;cursor:pointer;transition:color 0.15s;
}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:20px;line-height:1;}

/* PAGES */
.page{display:none;padding:0 16px;padding-top:24px;}
.page.active{display:block;}

/* HEADER */
.page-header{margin-bottom:24px;}
.page-label{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;
  margin-bottom:6px;
}
.page-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:42px;line-height:0.95;color:var(--text);letter-spacing:0.02em;
}
.page-title span{color:var(--accent);}

/* DATE STRIP */
.date-strip{
  display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;
  margin-bottom:20px;scrollbar-width:none;
}
.date-strip::-webkit-scrollbar{display:none;}
.date-chip{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  padding:8px 12px;border-radius:10px;background:var(--card);
  border:1px solid var(--border);cursor:pointer;transition:all 0.15s;
  min-width:52px;
}
.date-chip.today{border-color:var(--accent);background:#1a2200;}
.date-chip.selected{background:var(--accent);border-color:var(--accent);}
.date-chip.selected .dc-day,.date-chip.selected .dc-num{color:#000;}
.dc-day{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;}
.dc-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);line-height:1;}
.date-chip.today .dc-day{color:var(--accent);}
.date-chip.today .dc-num{color:var(--accent);}

/* HABIT CARDS */
.section-title{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;
  margin:20px 0 10px;
}
.habit-list{display:flex;flex-direction:column;gap:6px;}
.habit-item{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;
  user-select:none;
}
.habit-item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--border);transition:background 0.15s;
}
.habit-item.done::before{background:var(--accent);}
.habit-item.done{background:#141f00;border-color:#2a3d00;}
.habit-check{
  width:22px;height:22px;border-radius:6px;
  border:2px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;font-size:13px;
}
.habit-item.done .habit-check{
  background:var(--accent);border-color:var(--accent);color:#000;
}
.habit-info{flex:1;}
.habit-name{font-size:14px;font-weight:500;color:var(--text);}
.habit-item.done .habit-name{color:#8ab800;}
.habit-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.habit-streak{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--muted);padding:3px 7px;background:var(--bg);
  border-radius:6px;border:1px solid var(--border);
}
.habit-item.done .habit-streak{color:var(--accent);border-color:#2a3d00;background:#0e1a00;}

/* PROGRESS RING */
.progress-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
  display:flex;align-items:center;gap:20px;
  margin-bottom:20px;
}
.ring-wrap{position:relative;width:72px;height:72px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--border);stroke-width:6;}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.5s ease;}
.ring-text{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);
}
.progress-info{}
.progress-day{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);line-height:1;}
.progress-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.progress-done{font-size:13px;color:var(--accent);font-weight:500;margin-top:4px;}

/* TREINO PAGE */
.day-tabs{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{
  flex-shrink:0;padding:8px 16px;border-radius:8px;
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;
  text-transform:uppercase;border:1px solid var(--border);
  background:var(--card);color:var(--muted);cursor:pointer;transition:all 0.15s;
}
.day-tab.active{background:var(--accent);color:#000;border-color:var(--accent);}
.day-tab.rest{border-color:var(--muted2);}

.workout-block{margin-bottom:20px;}
.block-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.block-icon{font-size:18px;}
.block-name{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);}
.block-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-left:auto;}

.exercise-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;margin-bottom:4px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;transition:all 0.15s;
}
.exercise-card.postural{border-left:3px solid var(--accent2);}
.exercise-card.done-ex{background:#141f00;border-color:#2a3d00;}
.ex-left{}
.ex-name{font-size:13px;font-weight:500;}
.ex-note{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;max-width:220px;}
.ex-sets{
  font-family:'DM Mono',monospace;font-size:12px;
  color:var(--accent);white-space:nowrap;text-align:right;
}
.exercise-card.done-ex .ex-sets{color:#4ade80;}
.exercise-card.done-ex .ex-name{color:#8ab800;}

.rest-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;text-align:center;
}
.rest-emoji{font-size:40px;margin-bottom:12px;}
.rest-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--muted);}
.rest-sub{font-size:13px;color:var(--muted);margin-top:6px;}

/* STATS PAGE */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent);line-height:1;}
.stat-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:4px;}

.week-heatmap{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:8px;
}
.heatmap-title{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;}
.heatmap-row{display:flex;gap:4px;}
.heatmap-cell{
  flex:1;aspect-ratio:1;border-radius:4px;
  background:var(--border);transition:background 0.2s;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);
}
.heatmap-cell.level-1{background:#1a2d00;}
.heatmap-cell.level-2{background:#3d6600;}
.heatmap-cell.level-3{background:#7ab800;}
.heatmap-cell.level-4{background:var(--accent);color:#000;}

.habit-bar-list{display:flex;flex-direction:column;gap:8px;}
.habit-bar-item{}
.hbi-top{display:flex;justify-content:space-between;margin-bottom:4px;}
.hbi-name{font-size:12px;font-weight:500;}
.hbi-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);}
.hbi-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.hbi-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s ease;}

/* TOAST */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--accent);color:#000;
  font-family:'DM Mono',monospace;font-size:12px;font-weight:500;
  padding:10px 20px;border-radius:20px;
  opacity:0;transition:all 0.3s;pointer-events:none;
  white-space:nowrap;z-index:200;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="page-hoje" class="page active">
  <div class="page-header">
    <div class="page-label" id="today-date"></div>
    <div class="page-title">HOJE</div>
  </div>
  <div class="progress-card">
    <div class="ring-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle class="ring-bg" cx="36" cy="36" r="30"/>
        <circle class="ring-fill" id="ring-fill" cx="36" cy="36" r="30" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
      </svg>
      <div class="ring-text" id="ring-pct">0%</div>
    </div>
    <div class="progress-info">
      <div class="progress-day" id="progress-day-name">Segunda</div>
      <div class="progress-sub" id="progress-day-type">Força A</div>
      <div class="progress-done" id="progress-done-text">0 de 0 hábitos</div>
    </div>
  </div>

  <div class="section-title">Hábitos Diários</div>
  <div class="habit-list" id="daily-habits"></div>

  <div class="section-title" id="treino-section-title" style="display:none">Treino do Dia</div>
  <div class="habit-list" id="treino-habits"></div>
</div>

<div id="page-semana" class="page">
  <div class="page-header">
    <div class="page-label">7 dias</div>
    <div class="page-title">SE<span>MANA</span></div>
  </div>
  <div class="date-strip" id="date-strip"></div>
  <div class="habit-list" id="week-day-habits"></div>
</div>

<div id="page-treino" class="page">
  <div class="page-header">
    <div class="page-label">Protocolo</div>
    <div class="page-title">TRE<span>INO</span></div>
  </div>
  <div class="day-tabs" id="workout-tabs"></div>
  <div id="workout-content"></div>
</div>

<div id="page-stats" class="page">
  <div class="page-header">
    <div class="page-label">Progresso</div>
    <div class="page-title">STATS</div>
  </div>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="week-heatmap">
    <div class="heatmap-title">Últimas 4 semanas</div>
    <div class="heatmap-row" id="heatmap"></div>
  </div>
  <div class="section-title">Taxa por Hábito</div>
  <div class="habit-bar-list" id="habit-bars"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="goPage('hoje',this)">
    <span class="nav-icon">☀️</span>hoje
  </button>
  <button class="nav-btn" onclick="goPage('semana',this)">
    <span class="nav-icon">📅</span>semana
  </button>
  <button class="nav-btn" onclick="goPage('treino',this)">
    <span class="nav-icon">⚡</span>treino
  </button>
  <button class="nav-btn" onclick="goPage('stats',this)">
    <span class="nav-icon">📊</span>stats
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────
const DAILY_HABITS = [
  {id:'dieta', name:'Dieta Cetogênica', sub:'Sem carboidrato'},
  {id:'agua_sal', name:'Água + Sal', sub:'Eletrólitos'},
  {id:'sol', name:'Tomar Sol', sub:'Manhã ou tarde'},
  {id:'creatina', name:'Creatina 5g', sub:'Qualquer horário'},
  {id:'magnesio', name:'Magnésio', sub:'Antes de dormir'},
  {id:'release', name:'Fascia Release', sub:'~10h, após acordar'},
  {id:'yoga', name:'Yoga / Mobilidade', sub:'Após treino ou noite'},
  {id:'sono', name:'Sono OK', sub:'Dormiu bem'},
];

const WEEK_SCHEDULE = [
  {day:'Seg', type:'forca_a', label:'Força A'},
  {day:'Ter', type:'descanso', label:'Descanso'},
  {day:'Qua', type:'forca_b', label:'Força B'},
  {day:'Qui', type:'descanso', label:'Descanso'},
  {day:'Sex', type:'forca_a', label:'Força A'},
  {day:'Sáb', type:'sprint', label:'Sprint + Yoga'},
  {day:'Dom', type:'descanso_total', label:'Descanso Total'},
];

const WORKOUTS = {
  forca_a: {
    label: 'Força A — Empurrar + Core',
    blocks: [
      {
        name:'Ativação Postural', icon:'🎯', time:'15 min', postural:true,
        exercises:[
          {name:'Glute Bridge', sets:'3 × 15', note:'Segura 2s no topo'},
          {name:'Dead Bug', sets:'3 × 8 cada', note:'Lombar colada'},
          {name:'Psoas Stretch (Lunge)', sets:'2 × 45s', note:'Cada lado'},
          {name:'Wall Slide', sets:'3 × 10', note:'Escápulas na parede'},
          {name:'Chin Tuck', sets:'3 × 10', note:'Segura 5s'},
          {name:'Towel Scrunches', sets:'2 × 30s', note:'Dedos dos pés'},
          {name:'Calf Raise Unilateral', sets:'2 × 12', note:'Devagar na descida'},
        ]
      },
      {
        name:'Força — Empurrar', icon:'💪', time:'40 min',
        exercises:[
          {name:'Flexão de Braço', sets:'4 × máx', note:'Cotovelos a 45°'},
          {name:'Pike Push-up', sets:'3 × 8', note:'Quadril alto'},
          {name:'Dips (entre cadeiras)', sets:'3 × 10', note:'Desça até 90°'},
          {name:'Prancha', sets:'3 × 45s', note:'Quadril neutro'},
          {name:'Hollow Body Hold', sets:'3 × 20s', note:'Lombar no chão'},
        ]
      }
    ]
  },
  forca_b: {
    label: 'Força B — Pernas + Glúteo',
    blocks: [
      {
        name:'Ativação Postural', icon:'🎯', time:'15 min', postural:true,
        exercises:[
          {name:'Glute Bridge', sets:'3 × 15', note:'Segura 2s no topo'},
          {name:'Dead Bug', sets:'3 × 8 cada', note:'Lombar colada'},
          {name:'Psoas Stretch (Lunge)', sets:'2 × 45s', note:'Cada lado'},
          {name:'Wall Slide', sets:'3 × 10', note:'Escápulas na parede'},
          {name:'Chin Tuck', sets:'3 × 10', note:'Segura 5s'},
          {name:'Towel Scrunches', sets:'2 × 30s', note:'Dedos dos pés'},
          {name:'Calf Raise Unilateral', sets:'2 × 12', note:'Devagar na descida'},
        ]
      },
      {
        name:'Força — Pernas', icon:'🦵', time:'40 min',
        exercises:[
          {name:'Agachamento Búlgaro', sets:'4 × 8 cada', note:'Pé traseiro elevado'},
          {name:'Hip Thrust (mochila)', sets:'4 × 12', note:'Ombros no sofá'},
          {name:'Step-up (cadeira)', sets:'3 × 10 cada', note:'Empurra pelo calcanhar'},
          {name:'Glute Bridge Unilateral', sets:'3 × 12 cada', note:'Uma perna estendida'},
          {name:'Clamshell', sets:'3 × 15 cada', note:'Ativa glúteo médio'},
        ]
      }
    ]
  },
  sprint: {
    label: 'Sprint + Yoga Longa',
    blocks: [
      {
        name:'Sprint HIIT', icon:'🏃', time:'20 min',
        exercises:[
          {name:'Aquecimento — caminhada', sets:'5 min', note:'Antes de acelerar'},
          {name:'Sprint máximo', sets:'6–8 rounds', note:'30s sprint / 90s caminhar'},
          {name:'Desaceleração', sets:'3 min', note:'Caminha até recuperar'},
        ]
      },
      {
        name:'Yoga Longa', icon:'🧘', time:'30 min',
        exercises:[
          {name:'Cat-Cow', sets:'10 respirações', note:''},
          {name:"Child's Pose", sets:'2 min', note:''},
          {name:'Low Lunge', sets:'2 × 45s', note:'Cada lado'},
          {name:'Pigeon Pose', sets:'2 × 60s', note:'Cada lado'},
          {name:'Doorway Chest Stretch', sets:'3 × 30s', note:''},
          {name:'Thread the Needle', sets:'2 × 30s', note:'Cada lado'},
          {name:'Legs Up the Wall', sets:'5 min', note:'Final'},
        ]
      }
    ]
  },
  descanso: {
    label: 'Descanso',
    rest: true,
    sub: 'Caminhada leve ou liberação de fáscia se quiser'
  },
  descanso_total: {
    label: 'Descanso Total',
    rest: true,
    sub: 'Recuperação completa. Dorme bem.'
  }
};

// ── STORAGE ───────────────────────────────────────────────────────
function getKey(date) { return 'habits_' + date; }
function loadDay(date) {
  try { return JSON.parse(localStorage.getItem(getKey(date)) || '{}'); }
  catch { return {}; }
}
function saveDay(date, data) {
  localStorage.setItem(getKey(date), JSON.stringify(data));
}
function loadWorkoutDone(date) {
  try { return JSON.parse(localStorage.getItem('workout_' + date) || '{}'); }
  catch { return {}; }
}
function saveWorkoutDone(date, data) {
  localStorage.setItem('workout_' + date, JSON.stringify(data));
}

// ── UTILS ─────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}
function dateStr(d) { return d.toISOString().split('T')[0]; }
function getDayOfWeek(dateString) {
  const d = new Date(dateString + 'T12:00:00');
  return d.getDay(); // 0=sun
}
function getScheduleForDate(dateString) {
  const dow = getDayOfWeek(dateString);
  // 0=sun->dom, 1=mon->seg, etc
  const map = [6,0,1,2,3,4,5];
  return WEEK_SCHEDULE[map[dow]];
}
function formatDate(dateString) {
  const d = new Date(dateString + 'T12:00:00');
  return d.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── NAVIGATION ────────────────────────────────────────────────────
function goPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'semana') renderSemana();
  if (id === 'treino') renderTreino();
  if (id === 'stats') renderStats();
}

// ── HOJE PAGE ─────────────────────────────────────────────────────
let currentDate = todayStr();

function renderHoje() {
  const sched = getScheduleForDate(currentDate);
  const dayData = loadDay(currentDate);
  const wData = loadWorkoutDone(currentDate);

  // header
  document.getElementById('today-date').textContent = formatDate(currentDate);
  document.getElementById('progress-day-name').textContent = sched.day;
  document.getElementById('progress-day-type').textContent = sched.label;

  // daily habits
  const dailyEl = document.getElementById('daily-habits');
  dailyEl.innerHTML = '';
  DAILY_HABITS.forEach(h => {
    const done = !!dayData[h.id];
    const streak = calcStreak(h.id, currentDate);
    const el = document.createElement('div');
    el.className = 'habit-item' + (done ? ' done' : '');
    el.innerHTML = `
      <div class="habit-check">${done ? '✓' : ''}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-sub">${h.sub}</div>
      </div>
      <div class="habit-streak">${streak > 0 ? streak + '🔥' : '—'}</div>
    `;
    el.addEventListener('click', () => toggleHabit(h.id, currentDate));
    dailyEl.appendChild(el);
  });

  // treino habits
  const treinoEl = document.getElementById('treino-habits');
  const treinoTitle = document.getElementById('treino-section-title');
  treinoEl.innerHTML = '';

  const w = WORKOUTS[sched.type];
  if (w && !w.rest) {
    treinoTitle.style.display = 'block';
    const treinoHabits = [
      {id:'treino_feito', name:'Treino Completo', sub: w.label},
    ];
    treinoHabits.forEach(h => {
      const done = !!wData[h.id];
      const el = document.createElement('div');
      el.className = 'habit-item' + (done ? ' done' : '');
      el.innerHTML = `
        <div class="habit-check">${done ? '✓' : ''}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-sub">${h.sub}</div>
        </div>
        <div class="habit-streak">⚡</div>
      `;
      el.addEventListener('click', () => toggleWorkoutHabit(h.id, currentDate));
      treinoEl.appendChild(el);
    });
  } else {
    treinoTitle.style.display = 'none';
  }

  updateProgress();
}

function toggleHabit(id, date) {
  const data = loadDay(date);
  data[id] = !data[id];
  saveDay(date, data);
  renderHoje();
  if (data[id]) showToast('✓ ' + DAILY_HABITS.find(h=>h.id===id).name);
}

function toggleWorkoutHabit(id, date) {
  const data = loadWorkoutDone(date);
  data[id] = !data[id];
  saveWorkoutDone(date, data);
  renderHoje();
  if (data[id]) showToast('⚡ Treino marcado!');
}

function updateProgress() {
  const dayData = loadDay(currentDate);
  const wData = loadWorkoutDone(currentDate);
  const sched = getScheduleForDate(currentDate);
  const w = WORKOUTS[sched.type];

  let total = DAILY_HABITS.length;
  let done = DAILY_HABITS.filter(h => dayData[h.id]).length;
  if (w && !w.rest) { total++; if (wData['treino_feito']) done++; }

  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  const circ = 188.5;
  const offset = circ - (circ * pct / 100);

  document.getElementById('ring-fill').style.strokeDashoffset = offset;
  document.getElementById('ring-pct').textContent = pct + '%';
  document.getElementById('progress-done-text').textContent = done + ' de ' + total + ' hábitos';
}

function calcStreak(habitId, fromDate) {
  let streak = 0;
  let d = new Date(fromDate + 'T12:00:00');
  // check today first, if not done don't count
  for (let i = 0; i < 60; i++) {
    const ds = dateStr(d);
    const data = loadDay(ds);
    if (data[habitId]) { streak++; }
    else { break; }
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

// ── SEMANA PAGE ───────────────────────────────────────────────────
let selectedWeekDate = todayStr();

function renderSemana() {
  const strip = document.getElementById('date-strip');
  strip.innerHTML = '';
  const today = todayStr();

  for (let i = -3; i <= 3; i++) {
    const d = new Date(today + 'T12:00:00');
    d.setDate(d.getDate() + i);
    const ds = dateStr(d);
    const chip = document.createElement('div');
    chip.className = 'date-chip' + (ds === today ? ' today' : '') + (ds === selectedWeekDate ? ' selected' : '');

    const dayNames = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    chip.innerHTML = `<div class="dc-day">${dayNames[d.getDay()]}</div><div class="dc-num">${d.getDate()}</div>`;
    chip.addEventListener('click', () => { selectedWeekDate = ds; renderSemana(); });
    strip.appendChild(chip);
  }

  // show habits for selected date
  const dayData = loadDay(selectedWeekDate);
  const wData = loadWorkoutDone(selectedWeekDate);
  const sched = getScheduleForDate(selectedWeekDate);
  const el = document.getElementById('week-day-habits');
  el.innerHTML = '';

  const label = document.createElement('div');
  label.className = 'section-title';
  label.textContent = sched.day + ' — ' + sched.label;
  el.appendChild(label);

  DAILY_HABITS.forEach(h => {
    const done = !!dayData[h.id];
    const item = document.createElement('div');
    item.className = 'habit-item' + (done ? ' done' : '');
    item.innerHTML = `
      <div class="habit-check">${done ? '✓' : ''}</div>
      <div class="habit-info"><div class="habit-name">${h.name}</div></div>
    `;
    item.addEventListener('click', () => {
      const d2 = loadDay(selectedWeekDate);
      d2[h.id] = !d2[h.id];
      saveDay(selectedWeekDate, d2);
      renderSemana();
      if (selectedWeekDate === todayStr()) renderHoje();
    });
    el.appendChild(item);
  });

  const w = WORKOUTS[sched.type];
  if (w && !w.rest) {
    const tLabel = document.createElement('div');
    tLabel.className = 'section-title';
    tLabel.textContent = 'Treino';
    el.appendChild(tLabel);

    const done = !!wData['treino_feito'];
    const item = document.createElement('div');
    item.className = 'habit-item' + (done ? ' done' : '');
    item.innerHTML = `<div class="habit-check">${done ? '✓' : ''}</div><div class="habit-info"><div class="habit-name">Treino Completo</div><div class="habit-sub">${w.label}</div></div>`;
    item.addEventListener('click', () => {
      const d2 = loadWorkoutDone(selectedWeekDate);
      d2['treino_feito'] = !d2['treino_feito'];
      saveWorkoutDone(selectedWeekDate, d2);
      renderSemana();
      if (selectedWeekDate === todayStr()) renderHoje();
    });
    el.appendChild(item);
  }
}

// ── TREINO PAGE ───────────────────────────────────────────────────
let activeWorkoutDay = 0;

function renderTreino() {
  const tabs = document.getElementById('workout-tabs');
  tabs.innerHTML = '';
  WEEK_SCHEDULE.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === activeWorkoutDay ? ' active' : '') + (s.type.includes('descanso') ? ' rest' : '');
    btn.textContent = s.day;
    btn.addEventListener('click', () => { activeWorkoutDay = i; renderTreino(); });
    tabs.appendChild(btn);
  });

  const sched = WEEK_SCHEDULE[activeWorkoutDay];
  const w = WORKOUTS[sched.type];
  const content = document.getElementById('workout-content');
  content.innerHTML = '';

  if (w.rest) {
    const card = document.createElement('div');
    card.className = 'rest-card';
    card.innerHTML = `<div class="rest-emoji">🌿</div><div class="rest-title">${w.label}</div><div class="rest-sub">${w.sub}</div>`;
    content.appendChild(card);
    return;
  }

  const todayWData = loadWorkoutDone(todayStr());

  w.blocks.forEach(block => {
    const blockEl = document.createElement('div');
    blockEl.className = 'workout-block';
    blockEl.innerHTML = `
      <div class="block-header">
        <span class="block-icon">${block.icon}</span>
        <span class="block-name">${block.name}</span>
        <span class="block-time">${block.time}</span>
      </div>
    `;
    block.exercises.forEach((ex, ei) => {
      const exId = sched.type + '_' + block.name + '_' + ei;
      const done = !!todayWData[exId];
      const card = document.createElement('div');
      card.className = 'exercise-card' + (block.postural ? ' postural' : '') + (done ? ' done-ex' : '');
      card.innerHTML = `
        <div class="ex-left">
          <div class="ex-name">${ex.name}</div>
          ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
        </div>
        <div class="ex-sets">${done ? '✓' : ex.sets}</div>
      `;
      card.addEventListener('click', () => {
        const d = loadWorkoutDone(todayStr());
        d[exId] = !d[exId];
        saveWorkoutDone(todayStr(), d);
        renderTreino();
        renderHoje();
      });
      blockEl.appendChild(card);
    });
    content.appendChild(blockEl);
  });
}

// ── STATS PAGE ────────────────────────────────────────────────────
function renderStats() {
  const today = todayStr();
  let totalDays = 0;
  let perfectDays = 0;
  let totalChecks = 0;
  let longestStreak = 0;
  let currentStreak = 0;

  // last 28 days
  const cells = [];
  for (let i = 27; i >= 0; i--) {
    const d = new Date(today + 'T12:00:00');
    d.setDate(d.getDate() - i);
    const ds = dateStr(d);
    const data = loadDay(ds);
    const count = DAILY_HABITS.filter(h => data[h.id]).length;
    const pct = count / DAILY_HABITS.length;
    cells.push({ds, count, pct});
    if (count > 0) totalDays++;
    if (count === DAILY_HABITS.length) perfectDays++;
    totalChecks += count;
  }

  // current streak (consecutive days with >0 habits)
  for (let i = 0; i < 28; i++) {
    const d = new Date(today + 'T12:00:00');
    d.setDate(d.getDate() - i);
    const data = loadDay(dateStr(d));
    const count = DAILY_HABITS.filter(h => data[h.id]).length;
    if (count > 0) currentStreak++;
    else break;
  }

  // stats grid
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = '';
  const stats = [
    {num: currentStreak, label: 'Sequência Atual'},
    {num: perfectDays, label: 'Dias Perfeitos'},
    {num: totalDays, label: 'Dias Ativos'},
    {num: totalChecks, label: 'Total de Checks'},
  ];
  stats.forEach(s => {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `<div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div>`;
    grid.appendChild(card);
  });

  // heatmap
  const hm = document.getElementById('heatmap');
  hm.innerHTML = '';
  cells.forEach(c => {
    const cell = document.createElement('div');
    const level = c.pct === 0 ? 0 : c.pct < 0.3 ? 1 : c.pct < 0.6 ? 2 : c.pct < 1 ? 3 : 4;
    cell.className = 'heatmap-cell' + (level > 0 ? ' level-' + level : '');
    hm.appendChild(cell);
  });

  // habit bars — last 28 days
  const bars = document.getElementById('habit-bars');
  bars.innerHTML = '';
  DAILY_HABITS.forEach(h => {
    let count = 0;
    for (let i = 0; i < 28; i++) {
      const d = new Date(today + 'T12:00:00');
      d.setDate(d.getDate() - i);
      const data = loadDay(dateStr(d));
      if (data[h.id]) count++;
    }
    const pct = Math.round((count/28)*100);
    const item = document.createElement('div');
    item.className = 'habit-bar-item';
    item.innerHTML = `
      <div class="hbi-top"><span class="hbi-name">${h.name}</span><span class="hbi-pct">${pct}%</span></div>
      <div class="hbi-track"><div class="hbi-fill" style="width:${pct}%"></div></div>
    `;
    bars.appendChild(item);
  });
}

// ── INIT ──────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

renderHoje();

// set today's workout tab to current day
const todayDow = new Date().getDay();
const dowToSched = [6,0,1,2,3,4,5];
activeWorkoutDay = dowToSched[todayDow];
</script>
